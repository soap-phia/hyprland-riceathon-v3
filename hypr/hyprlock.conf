################
### HYPRLOCK ###
################

general {
    hide_cursor = true
    no_fade_in = false
    no_fade_out = false
    ignore_empty_input = true
}

background {
    monitor =
    path = $HOME/.config/hypr/wallpaper.jpg
    blur_passes = 4
    blur_size = 4
    noise = 0.02
    contrast = 0.85
    brightness = 0.6
    vibrancy = 0.2
    vibrancy_darkness = 0.0
    color = rgb(1c121e)
}


label {
    monitor =
    text = $TIME12
    font_size = 72
    font_family = JetBrains Mono Nerd Font Bold
    color = rgb(fde8ff)

    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(1c121ecc)
    shadow_boost = 0.8

    position = 0, 200
    halign = center
    valign = center
}


label {
    monitor =
    text = cmd[update:60000] date +"%A, %B %d"
    font_size = 18
    font_family = JetBrains Mono Nerd Font
    color = rgb(d698e6)

    shadow_passes = 2
    shadow_size = 3
    shadow_color = rgba(1c121ecc)
    shadow_boost = 0.8

    position = 0, 120
    halign = center
    valign = center
}


label {
    monitor =
    text =
    font_size = 14
    font_family = JetBrains Mono Nerd Font
    color = rgb(a167a5)

    position = 0, 60
    halign = center
    valign = center
}


input-field {
    monitor =
    size = 320, 48
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    dots_rounding = -1

    outer_color = rgb(4f3252)
    inner_color = rgba(2c1c2ecc)
    font_color = rgb(fde8ff)
    font_family = JetBrains Mono Nerd Font
    font_size = 14

    fade_on_empty = true
    fade_timeout = 2000
    placeholder_text = <span foreground="##a167a5">...</span>
    hide_input = false
    rounding = 12

    check_color = rgb(d698e6)
    fail_color = rgb(f38fad)
    fail_text = <span foreground="##f38fad">$FAIL</span>
    fail_transition = 300

    capslock_color = rgb(f9dca1)
    numlock_color = -1
    bothlock_color = -1

    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(1c121ecc)
    shadow_boost = 0.8

    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:30000] cat /sys/class/power_supply/BAT*/capacity 2>/dev/null | head -1 | sed 's/$/%/' || echo ""
    font_size = 12
    font_family = JetBrains Mono Nerd Font
    color = rgb(a167a5)

    position = -24, 24
    halign = right
    valign = bottom
}
